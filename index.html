<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tough Cheddar Studios</title>
  <meta name="description" content="Tough Cheddar Studios — an indie games studio." />
  <link rel="icon" type="image/png" href="images/toughcheddar-studios-logo-1.png" />

  <!-- Open Graph / social preview -->
  <meta property="og:title" content="Tough Cheddar Studios" />
  <meta property="og:description" content="An indie games studio." />
  <meta property="og:image" content="images/toughcheddar-studios-logo-1.png" />
  <meta property="og:type" content="website" />

  <style>
    :root {
      --cream: #f4ead2;
      --navy: #1d3a5f;
      --gold: #e8a317;
      --gold-bright: #f5b81c;
      --ink: #1a1a1a;
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--ink);
      background: var(--cream);
      line-height: 1.6;
    }

    /* Hero */
    .hero {
      flex: 1 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 4rem 1.25rem 3rem;
    }
    .hero img.logo {
      width: min(420px, 80vw);
      height: auto;
      border-radius: 16px;
    }
    .hero h1 {
      font-size: clamp(1.6rem, 4vw, 2.6rem);
      margin: 1.5rem 0 0.5rem;
      color: var(--navy);
      letter-spacing: 0.02em;
    }
    .tagline {
      font-size: clamp(1rem, 2.4vw, 1.25rem);
      color: #4a4a4a;
      max-width: 36ch;
      margin: 0 auto 0.75rem;
    }
    .motto {
      font-style: italic;
      font-size: clamp(0.95rem, 2vw, 1.1rem);
      color: var(--navy);
      max-width: 42ch;
      margin: 0 auto 2rem;
    }

    .cta {
      display: inline-block;
      background: var(--gold);
      color: var(--ink);
      font-weight: 700;
      font-size: 1.1rem;
      text-decoration: none;
      padding: 0.85rem 1.8rem;
      border-radius: 999px;
      border: 2px solid var(--navy);
      box-shadow: 0 3px 0 var(--navy);
      transition: transform 0.08s ease, box-shadow 0.08s ease, background 0.15s ease;
    }
    .cta:hover { background: var(--gold-bright); }
    .cta:active { transform: translateY(3px); box-shadow: 0 0 0 var(--navy); }

    /* Footer */
    footer {
      flex: 0 0 auto;
      text-align: center;
      padding: 2.5rem 1.25rem 3rem;
      color: #5a5a5a;
      font-size: 0.95rem;
    }
    footer a { color: var(--navy); font-weight: 600; }
    footer .links { margin-bottom: 0.75rem; }
    footer .links a { margin: 0 0.6rem; }
  </style>
</head>
<body>
  <header class="hero">
    <img class="logo" src="images/toughcheddar-studios-logo-1.png" alt="Tough Cheddar Studios logo" />
    <h1>Tough Cheddar Studios</h1>
    <p class="tagline">An indie games studio.</p>
    <p class="motto">Bitey, crumbly and always tasty, sometimes hard and sometimes cheesy, but aged to perfection.</p>
    <a class="cta" href="https://toughcheddar.itch.io" target="_blank" rel="noopener">Find us on itch.io →</a>
  </header>

  <footer>
    <div class="links">
      <a href="https://toughcheddar.itch.io" target="_blank" rel="noopener">itch.io</a>
      <a href="https://github.com/toughcheddar" target="_blank" rel="noopener">GitHub</a>
    </div>
    <div>&copy; 2024–2026 Tough Cheddar Studios</div>
  </footer>
</body>
</html>
